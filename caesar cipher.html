<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Caesar Cipher</title>
    <!-- Google Fonts for a more modern font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for a more polished look */
        body {
            font-family: 'Poppins', sans-serif;
            background: #4A00E0; 
            background: -webkit-linear-gradient(to right, #8E2DE2, #4A00E0); 
            background: linear-gradient(to right, #8E2DE2, #4A00E0); 
        }
        /* Custom button styles for a beautiful gradient and hover effect */
        .btn-gradient-indigo {
            background-image: linear-gradient(to right, #6366f1, #8b5cf6, #a855f7);
            transition: all 0.3s ease-in-out;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-gradient-indigo:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.2);
        }
        .btn-gradient-gray {
            background-image: linear-gradient(to right,  #6366f1, #8b5cf6, #a855f7);
            transition: all 0.3s ease-in-out;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-gradient-gray:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 md:p-8 text-gray-800">
    <div class="bg-white p-6 md:p-10 rounded-3xl shadow-2xl w-full max-w-2xl backdrop-blur-lg bg-opacity-70 border border-white border-opacity-30">
        <h1 class="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-6 md:mb-8 tracking-wide">Caesar Cipher</h1>
        <p class="text-center text-sm md:text-base text-gray-600 mb-6">Encrypt or decrypt your text with a simple shift cipher.</p>
        
        <!-- Input section -->
        <div class="space-y-4">
            <div>
                <label for="inputText" class="block text-sm font-semibold text-gray-700 mb-1">Your Message:</label>
                <textarea id="inputText" rows="5" placeholder="Type your secret message here..." class="block w-full rounded-xl border-gray-300 shadow-inner focus:ring-purple-500 focus:border-purple-500 p-3 border resize-none transition-colors duration-200"></textarea>
            </div>
            <div>
                <label for="shiftKey" class="block text-sm font-semibold text-gray-700 mb-1">Shift Key (1-25):</label>
                <input type="number" id="shiftKey" value="3" min="1" max="25" class="mt-1 block w-full rounded-xl border-gray-300 shadow-inner focus:ring-purple-500 focus:border-purple-500 p-3 border transition-colors duration-200">
            </div>
        </div>

        <!-- Action buttons -->
        <div class="mt-6 flex flex-col md:flex-row md:space-x-4 space-y-4 md:space-y-0">
            <button id="encryptButton" class="w-full md:w-1/2 py-3 px-4 rounded-full font-bold text-white btn-gradient-indigo shadow-lg hover:shadow-xl">Encrypt</button>
            <button id="decryptButton" class="w-full md:w-1/2 py-3 px-4 rounded-full font-bold text-white btn-gradient-gray shadow-lg hover:shadow-xl">Decrypt</button>
        </div>

        <!-- Output section -->
        <div class="mt-6">
            <label for="outputText" class="block text-sm font-semibold text-gray-700 mb-1">Result:</label>
            <textarea id="outputText" rows="5" readonly class="block w-full rounded-xl bg-gray-100 border-gray-300 shadow-inner p-3 border resize-none cursor-not-allowed"></textarea>
            <div class="mt-4 flex justify-end">
                <button id="copyButton" class="py-2 px-4 bg-purple-600 text-white rounded-xl shadow-lg hover:bg-purple-700 focus:outline-none transition-colors duration-200 flex items-center gap-2" title="Copy to clipboard">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2m-6 0h.01M12 12h.01M16 16h.01M20 7v8a2 2 0 01-2 2H9a2 2 0 01-2-2V7a2 2 0 012-2h4a2 2 0 012 2z" />
                    </svg>
                    Copy
                </button>
            </div>
        </div>

        <!-- Message/Error box -->
        <div id="messageBox" class="mt-4 p-3 text-sm rounded-xl transition-all duration-300 opacity-0 h-0 overflow-hidden"></div>
    </div>

    <script>
        // Get all necessary HTML elements
        const inputText = document.getElementById('inputText');
        const shiftKeyInput = document.getElementById('shiftKey');
        const encryptButton = document.getElementById('encryptButton');
        const decryptButton = document.getElementById('decryptButton');
        const outputText = document.getElementById('outputText');
        const messageBox = document.getElementById('messageBox');
        const copyButton = document.getElementById('copyButton');

        /**
         * Shows a message to the user for a brief period.
         * @param {string} message The message to display.
         * @param {string} type The type of message ('success', 'error', 'info').
         */
        function showMessage(message, type) {
            const colors = {
                success: 'bg-green-100 text-green-700',
                error: 'bg-red-100 text-red-700',
                info: 'bg-blue-100 text-blue-700'
            };
            messageBox.textContent = message;
            messageBox.className = `mt-4 p-3 text-sm rounded-xl transition-all duration-300 ${colors[type]}`;
            messageBox.style.opacity = '1';
            messageBox.style.height = 'auto';

            setTimeout(() => {
                messageBox.style.opacity = '0';
                messageBox.style.height = '0';
            }, 3000);
        }

        /**
         * Core function to perform Caesar cipher encryption or decryption.
         * @param {string} text The input string to process.
         * @param {number} shift The number of places to shift.
         * @param {boolean} isEncrypt True for encryption, false for decryption.
         * @returns {string} The resulting encrypted or decrypted text.
         */
        function caesarCipher(text, shift, isEncrypt) {
            let result = '';
            // If decrypting, the shift is reversed
            const actualShift = isEncrypt ? shift : -shift;

            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                let charCode = char.charCodeAt(0);

                // Check for uppercase letters
                if (charCode >= 65 && charCode <= 90) {
                    // Apply the shift and handle wrap-around
                    let newCharCode = ((charCode - 65 + actualShift) % 26);
                    // Handle negative modulo results correctly
                    if (newCharCode < 0) {
                        newCharCode += 26;
                    }
                    result += String.fromCharCode(newCharCode + 65);
                } 
                // Check for lowercase letters
                else if (charCode >= 97 && charCode <= 122) {
                    // Apply the shift and handle wrap-around
                    let newCharCode = ((charCode - 97 + actualShift) % 26);
                    // Handle negative modulo results correctly
                    if (newCharCode < 0) {
                        newCharCode += 26;
                    }
                    result += String.fromCharCode(newCharCode + 97);
                }
                // Non-alphabetic characters are not changed
                else {
                    result += char;
                }
            }
            return result;
        }

        /**
         * Event handler for the Encrypt button.
         */
        encryptButton.addEventListener('click', () => {
            const text = inputText.value;
            const shift = parseInt(shiftKeyInput.value, 10);
            
            // Basic input validation
            if (!text) {
                showMessage("Please enter some text to encrypt.", 'error');
                return;
            }
            if (isNaN(shift) || shift < 1 || shift > 25) {
                showMessage("Please enter a valid shift key between 1 and 25.", 'error');
                return;
            }

            const encryptedText = caesarCipher(text, shift, true);
            outputText.value = encryptedText;
            showMessage("Text encrypted successfully!", 'success');
        });

        /**
         * Event handler for the Decrypt button.
         */
        decryptButton.addEventListener('click', () => {
            const text = inputText.value;
            const shift = parseInt(shiftKeyInput.value, 10);

            // Basic input validation
            if (!text) {
                showMessage("Please enter some text to decrypt.", 'error');
                return;
            }
            if (isNaN(shift) || shift < 1 || shift > 25) {
                showMessage("Please enter a valid shift key between 1 and 25.", 'error');
                return;
            }
            
            const decryptedText = caesarCipher(text, shift, false);
            outputText.value = decryptedText;
            showMessage("Text decrypted successfully!", 'success');
        });

        /**
         * Event handler for the Copy button.
         */
        copyButton.addEventListener('click', () => {
            if (outputText.value) {
                // Select the text in the output textarea
                outputText.select();
                outputText.setSelectionRange(0, 99999); // For mobile devices

                try {
                    // Copy the text to the clipboard
                    document.execCommand('copy');
                    showMessage("Text copied to clipboard!", 'success');
                } catch (err) {
                    showMessage("Failed to copy text. Please try again.", 'error');
                }
            } else {
                showMessage("Nothing to copy!", 'info');
            }
        });
    </script>
</body>
</html>
